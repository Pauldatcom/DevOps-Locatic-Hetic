apiVersion: apps/v1
kind: Deployment
metadata:
  name: locatic
  labels:
    {{- include "locatic.labels" . | nindent 4 }}
    app.kubernetes.io/component: app
spec:
  replicas: {{ .Values.app.replicas }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "locatic.selectorApp" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "locatic.selectorApp" . | nindent 8 }}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: {{ .Values.app.port | quote }}
        prometheus.io/path: "/metrics"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: {{ .Values.app.securityContext.runAsUser }}
        runAsGroup: {{ .Values.app.securityContext.runAsGroup }}
        fsGroup: {{ .Values.app.securityContext.fsGroup }}
      containers:
        - name: locatic
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.app.port }}
          envFrom:
            - configMapRef:
                name: locatic-config
            - secretRef:
                name: locatic-secret
                optional: true
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          volumeMounts:
            - name: sqlite-data
              mountPath: {{ .Values.app.mountPath }}
          resources:
            {{- toYaml .Values.app.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            runAsUser: {{ .Values.app.securityContext.runAsUser }}
            runAsGroup: {{ .Values.app.securityContext.runAsGroup }}
            capabilities:
              drop:
                - ALL
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /health
              port: http
            failureThreshold: 30
            periodSeconds: 5
      volumes:
        - name: sqlite-data
          persistentVolumeClaim:
            claimName: {{ .Values.app.pvcName }}
