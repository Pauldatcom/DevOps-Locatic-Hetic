# Valeurs par defaut (surchargeables via values-dev/prod ou --set)

namespace: locatic-staging

image:
  repository: ghcr.io/pauldatcom/locatic
  tag: latest
  pullPolicy: IfNotPresent

app:
  replicas: 1
  port: 8080
  logLevel: info
  sqlitePath: /data/agence.db
  pvcName: locatic-sqlite
  mountPath: /data
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  securityContext:
    runAsUser: 999
    runAsGroup: 999
    fsGroup: 999

nginx:
  enabled: true
  replicas: 1
  image: nginxinc/nginx-unprivileged:1.27-alpine
  exporterImage: nginx/nginx-prometheus-exporter:1.3.0
  serviceType: NodePort
  httpPort: 80
  metricsPort: 9113
  upstream: locatic:8080
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 250m
      memory: 128Mi
  exporterResources:
    requests:
      cpu: 20m
      memory: 32Mi
    limits:
      cpu: 100m
      memory: 64Mi
