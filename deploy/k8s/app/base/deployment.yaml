apiVersion: apps/v1
kind: Deployment
metadata:
  name: locatic
  labels:
    app.kubernetes.io/name: locatic
    app.kubernetes.io/component: app
spec:
  # SQLite + PVC ReadWriteOnce : une seule replica writer.
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: locatic
      app.kubernetes.io/component: app
  template:
    metadata:
      labels:
        app.kubernetes.io/name: locatic
        app.kubernetes.io/component: app
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      # UID numerique requis par runAsNonRoot (useradd -r => 999 dans le Dockerfile).
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        runAsGroup: 999
        fsGroup: 999
      containers:
        - name: locatic
          image: ghcr.io/pauldatcom/locatic:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: locatic-config
            - secretRef:
                name: locatic-secret
                optional: true
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          volumeMounts:
            - name: sqlite-data
              mountPath: /data
              readOnly: false
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            runAsUser: 999
            runAsGroup: 999
            capabilities:
              drop:
                - ALL
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /health
              port: http
            failureThreshold: 30
            periodSeconds: 5
      volumes:
        - name: sqlite-data
          # PVC creee par Terraform (module storage).
          persistentVolumeClaim:
            claimName: locatic-sqlite
