apiVersion: v1
kind: Service
metadata:
  name: locatic-nginx
  labels:
    app.kubernetes.io/name: locatic
    app.kubernetes.io/component: nginx
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: locatic
    app.kubernetes.io/component: nginx
  ports:
    - name: http
      port: 80
      targetPort: http
