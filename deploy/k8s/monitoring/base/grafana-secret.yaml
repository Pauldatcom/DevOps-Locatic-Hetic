# Template de Secret pour Grafana.
#
# NE JAMAIS committer de vrai mot de passe. Les placeholders CHANGE_ME sont
# surcharges par Ansible au deploiement (depuis un vault ou via `kubectl create
# secret`). Pour le developpement local, on accepte des valeurs par defaut
# faibles ; en prod, elles doivent etre changees.
apiVersion: v1
kind: Secret
metadata:
  name: grafana-admin-secret
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/component: monitoring
type: Opaque
stringData:
  # Mot de passe admin Grafana - surcharger via Ansible en prod.
  GF_SECURITY_ADMIN_PASSWORD: devops-training-local
  GF_SECURITY_ADMIN_USER: admin