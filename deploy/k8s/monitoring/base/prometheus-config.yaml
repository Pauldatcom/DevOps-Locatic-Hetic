apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  labels:
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/component: monitoring
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    alerting:
      alertmanagers:
        - static_configs:
            - targets:
                - alertmanager:9093

    rule_files:
      - "/etc/prometheus/alerts.yml"

    scrape_configs:
      # Auto-supervision Prometheus
      - job_name: "prometheus"
        static_configs:
          - targets: ["localhost:9090"]

      # Application Locatic : /metrics expose par prometheus-net.AspNetCore
      # Le Service locatic est ClusterIP dans le namespace applicatif.
      # En prod on remplace locatic-staging par locatic-prod via overlay.
      - job_name: "locatic-app"
        metrics_path: "/metrics"
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names:
                - locatic-staging
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_name]
            regex: locatic
            action: keep
          - source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_component]
            regex: app
            action: keep
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            regex: "true"
            action: keep
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_port, __meta_kubernetes_pod_ip]
            separator: ";"
            regex: (.+);(.+)
            target_label: __address__
            replacement: $2:$1
            action: replace
        scrape_interval: 5s

      # Nginx reverse proxy via nginx-prometheus-exporter (sidecar, port 9113)
      - job_name: "nginx"
        metrics_path: "/metrics"
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names:
                - locatic-staging
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_component]
            regex: nginx
            action: keep
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            regex: "true"
            action: keep
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_port, __meta_kubernetes_pod_ip]
            separator: ";"
            regex: (.+);(.+)
            target_label: __address__
            replacement: $2:$1
            action: replace
        scrape_interval: 10s

      # Node Exporter : metriques du noeud minikube (CPU, mem, disque)
      - job_name: "node"
        static_configs:
          - targets: ["node-exporter:9100"]

      # Kubelet : metriques internes du noeud (pods, containers)
      - job_name: "kubelet"
        kubernetes_sd_configs:
          - role: node
        scheme: https
        tls_config:
          ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
          insecure_skip_verify: true
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        relabel_configs:
          - action: labelmap
            regex: __meta_kubernetes_node_label_(.+)
        metric_relabel_configs:
          - action: replace
            source_labels: [__meta_kubernetes_node_name]
            target_label: node

  alerts.yml: |
    groups:
      - name: app-alerts
        rules:
          - alert: AppDown
            expr: up{job="locatic-app"} == 0
            for: 1m
            labels:
              severity: critical
            annotations:
              summary: "Application Locatic down"
              description: "L'application {{ $labels.instance }} est down depuis plus d'1 minute."

          - alert: HighLatency
            expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket{job="locatic-app"}[5m])) > 0.5
            for: 2m
            labels:
              severity: warning
            annotations:
              summary: "Latence elevee (P95 > 500ms)"
              description: "Le P95 de latence depasse 500ms sur {{ $labels.instance }}."

          - alert: HighErrorRate
            expr: sum(rate(http_requests_total{job="locatic-app",status=~"5.."}[5m])) / sum(rate(http_requests_total{job="locatic-app"}[5m])) > 0.05
            for: 2m
            labels:
              severity: warning
            annotations:
              summary: "Taux d'erreur eleve"
              description: "Plus de 5% de reponses 5xx sur l'application."

      - name: infra-alerts
        rules:
          - alert: HighCPU
            expr: 100 - (avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 80
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "CPU eleve"
              description: "CPU > 80% sur {{ $labels.instance }} depuis 5 min."

          - alert: DiskAlmostFull
            expr: (node_filesystem_avail_bytes / node_filesystem_size_bytes) * 100 < 15
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "Disque presque plein"
              description: "Moins de 15% d'espace disque sur {{ $labels.instance }}."

          - alert: PrometheusTargetDown
            expr: count(up == 0) > 1
            for: 2m
            labels:
              severity: warning
            annotations:
              summary: "Cibles Prometheus down"
              description: "{{ $value }} cibles Prometheus sont down depuis 2 min."