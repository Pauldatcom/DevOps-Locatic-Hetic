apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Overlay prod : namespace 'monitoring' commun, ressources legerement plus
# generoureuses. Le scrape job 'locatic-app' doit pointer vers locatic-prod :
# il faut adapter le ConfigMap prometheus-config (legerement different en
# prod) via Ansible ou une ConfigMap dediee.
namespace: monitoring

resources:
  - ../../base

commonLabels:
  app.kubernetes.io/environment: prod

patches:
  - target:
      kind: Deployment
      name: prometheus
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: 384Mi
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: 768Mi
  - target:
      kind: Deployment
      name: grafana
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: 192Mi
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: 384Mi