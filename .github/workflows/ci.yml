name: CI Pipeline

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

jobs:
    lint:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-dotnet@v4
              with:
                dotnet-version: '8.0.x'
            - run: dotnet restore Locatic/Locatic.csproj
            - run: dotnet format Locatic/Locatic.csproj --verify-no-changes --severity error

    build:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-dotnet@v4
              with:
                dotnet-version: '8.0.x'
            - run: dotnet restore Locatic/Locatic.csproj
            - run: dotnet build Locatic/Locatic.csproj --no-restore --configuration Release
            - run: dotnet test Locatic/Locatic.csproj --no-build --configuration Release --verbosity normal

    security:
        needs: build
        runs-on: ubuntu-latest
        steps:
        - uses: actions/checkout@v4
        - uses: aquasecurity/trivy-action@v0.36.0
          with:
            scan-type: fs
            scan-ref: Locatic/
            severity: HIGH,CRITICAL
            ignore-unfixed: true
            exit-code: 1
            format: table

    docker-build:
        needs: build
        uses: ./.github/workflows/reusable-docker.yml
        with:
            image-name: locatic

    publish:
        needs: [lint, security, docker-build]
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        runs-on: ubuntu-latest
        permissions:
            contents: read
            packages: write
        steps:
            - uses: actions/checkout@v4
            - uses: docker/setup-buildx-action@v3
            - uses: docker/login-action@v3
              with:
                registry: ghcr.io
                username: ${{ github.actor }}
                password: ${{ secrets.GITHUB_TOKEN }}
            - name: Docker meta
              id: meta
              uses: docker/metadata-action@v5
              with:
                images: ghcr.io/${{ github.repository_owner }}/locatic
                tags: |
                    type=sha,prefix=
                    type=raw,value=latest
            - uses: docker/build-push-action@v5
              with:
                context: .
                file: ./Dockerfile
                push: true
                tags: ${{ steps.meta.outputs.tags }}
                labels: ${{ steps.meta.outputs.labels }}
                cache-from: type=gha
                cache-to: type=gha,mode=max

    # Le pipeline GitHub s'arrête volontairement après ces contrôles : le
    # déploiement sur minikube est déclenché en local via Terraform/Ansible,
    # jamais depuis les runners GitHub.
