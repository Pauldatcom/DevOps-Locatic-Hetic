- name: Verifier les prerequis locaux
  ansible.builtin.command: "{{ item }}"
  loop:
    - docker version
    - kubectl version --client
  changed_when: false

- name: Verifier que le cluster local est disponible
  ansible.builtin.command: kubectl cluster-info
  changed_when: false

- name: Charger les outputs Terraform si disponibles
  when: ansible_vars_file is file
  ansible.builtin.include_vars:
    file: "{{ ansible_vars_file }}"
    name: terraform_vars

- name: Builder l'image Docker Locatic
  ansible.builtin.command:
    cmd: "docker build -t {{ locatic_image_name }} ."
    chdir: "{{ locatic_docker_context }}"
  changed_when: true

- name: Charger l'image dans minikube
  when: k8s_cluster_type == "minikube"
  ansible.builtin.command:
    cmd: "minikube image load {{ locatic_image_name }}"
  changed_when: true

- name: Charger l'image dans kind
  when: k8s_cluster_type == "kind"
  ansible.builtin.command:
    cmd: "kind load docker-image {{ locatic_image_name }} --name {{ kind_cluster_name }}"
  changed_when: true

- name: Appliquer les manifests de l'application (Kustomize)
  ansible.builtin.command:
    cmd: "kubectl apply -k {{ k8s_app_overlay }}"
  changed_when: true

- name: Appliquer les manifests Nginx (Kustomize)
  ansible.builtin.command:
    cmd: "kubectl apply -k {{ k8s_nginx_overlay }}"
  changed_when: true

- name: Creer le Secret Grafana (non versionne)
  when: deploy_monitoring | bool
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: grafana-admin-secret
        namespace: "{{ monitoring_namespace }}"
        labels:
          app.kubernetes.io/name: grafana
          app.kubernetes.io/component: monitoring
      type: Opaque
      stringData:
        GF_SECURITY_ADMIN_USER: "{{ grafana_admin_user }}"
        GF_SECURITY_ADMIN_PASSWORD: "{{ grafana_admin_password }}"

- name: Appliquer la stack de monitoring (Kustomize)
  when: deploy_monitoring | bool
  ansible.builtin.command:
    cmd: "kubectl apply -k {{ k8s_monitoring_overlay }}"
  changed_when: true

- name: Attendre que le deploiement de l'app soit disponible
  kubernetes.core.k8s_info:
    kind: Deployment
    name: "{{ k8s_app_deployment }}"
    namespace: "{{ k8s_namespace }}"
    wait: true
    wait_condition:
      type: Available
      status: "True"
    wait_timeout: 180

- name: Attendre que le deploiement nginx soit disponible
  kubernetes.core.k8s_info:
    kind: Deployment
    name: "{{ k8s_nginx_deployment }}"
    namespace: "{{ k8s_namespace }}"
    wait: true
    wait_condition:
      type: Available
      status: "True"
    wait_timeout: 120
