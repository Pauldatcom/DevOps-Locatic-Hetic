apiVersion: apps/v1
kind: Deployment
metadata:
  name: locatic-app
  namespace: locatic
  labels:
    app.kubernetes.io/name: locatic
    app.kubernetes.io/component: app
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: locatic
      app.kubernetes.io/component: app
  template:
    metadata:
      labels:
        app.kubernetes.io/name: locatic
        app.kubernetes.io/component: app
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "8080"
    spec:
      containers:
        - name: locatic
          image: locatic:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: locatic-app-config
          volumeMounts:
            - name: sqlite-data
              mountPath: /data
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      volumes:
        - name: sqlite-data
          persistentVolumeClaim:
            claimName: locatic-sqlite-data
---
apiVersion: v1
kind: Service
metadata:
  name: locatic-app
  namespace: locatic
  labels:
    app.kubernetes.io/name: locatic
    app.kubernetes.io/component: app
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/path: "/metrics"
    prometheus.io/port: "8080"
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: locatic
    app.kubernetes.io/component: app
  ports:
    - name: http
      port: 8080
      targetPort: http
