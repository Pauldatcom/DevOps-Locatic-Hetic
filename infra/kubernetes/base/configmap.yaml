apiVersion: v1
kind: ConfigMap
metadata:
  name: locatic-app-config
  namespace: locatic
  labels:
    app.kubernetes.io/name: locatic
    app.kubernetes.io/component: app
data:
  ASPNETCORE_ENVIRONMENT: "Production"
  ASPNETCORE_URLS: "http://+:8080"
  ConnectionStrings__DefaultConnection: "Data Source=/data/agence.db"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: locatic-nginx-config
  namespace: locatic
  labels:
    app.kubernetes.io/name: locatic
    app.kubernetes.io/component: nginx
data:
  default.conf: |
    server {
        listen 80;
        server_name _;

        location / {
            proxy_pass http://locatic-app:8080;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /health {
            proxy_pass http://locatic-app:8080/health;
            proxy_http_version 1.1;
        }
    }
