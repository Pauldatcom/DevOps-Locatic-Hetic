apiVersion: v1
kind: Service
metadata:
  name: locatic
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: locatic
    app.kubernetes.io/component: app
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  type: {{ .Values.service.type }}
  selector:
    app.kubernetes.io/name: locatic
    app.kubernetes.io/component: app
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP