apiVersion: apps/v1
kind: Deployment
metadata:
  name: locatic
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: locatic
    app.kubernetes.io/component: app
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: locatic
      app.kubernetes.io/component: app
  template:
    metadata:
      labels:
        app.kubernetes.io/name: locatic
        app.kubernetes.io/component: app
        app.kubernetes.io/instance: {{ .Release.Name }}
      {{- if .Values.monitoring.prometheusScrape }}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "{{ .Values.monitoring.prometheusPort }}"
        prometheus.io/path: {{ .Values.monitoring.prometheusPath }}
      {{- end }}
    spec:
      securityContext:
        {{- toYaml .Values.securityContext | nindent 8 }}
      containers:
        - name: locatic
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: locatic-config
            - secretRef:
                name: locatic-secret
          volumeMounts:
            - name: sqlite-data
              mountPath: {{ .Values.sqlite.mountPath }}
              readOnly: false
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: {{ .Values.probes.liveness.path }}
              port: http
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.liveness.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.liveness.failureThreshold }}
          readinessProbe:
            httpGet:
              path: {{ .Values.probes.readiness.path }}
              port: http
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.readiness.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.readiness.failureThreshold }}
          startupProbe:
            httpGet:
              path: {{ .Values.probes.startup.path }}
              port: http
            failureThreshold: {{ .Values.probes.startup.failureThreshold }}
            periodSeconds: {{ .Values.probes.startup.periodSeconds }}
      volumes:
        - name: sqlite-data
          persistentVolumeClaim:
            claimName: {{ .Values.sqlite.pvc.name | default "locatic-sqlite" }}